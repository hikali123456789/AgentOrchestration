name: CI
on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'Makefile'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pyproject.toml'
      - 'Makefile'
      - 'README.md'
      - 'docs/**'
      - 'config/**'
      - 'scripts/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest --cov=src tests/
      - name: Lint
        run: uv run flake8 src/ tests/

  path-filter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check path filter coverage
        run: |
          echo "Checking path filter coverage..."
          critical_paths=("src/" "tests/" ".github/workflows/" "pyproject.toml")
          for path in "${critical_paths[@]}"; do
            if grep -q "$path" .github/workflows/ci.yml; then
              echo "✓ $ is covered"
            else
              echo "✗ $ is NOT covered"
              exit 1
            fi
          done
          echo "All critical paths are covered by filters!"